name: Dependencies Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  OSV_FAIL_ON_SEVERITY: HIGH
  OSV_ENFORCE: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
  AUDIT_FAIL_ON_SEVERITY: HIGH
  AUDIT_GRACE_DAYS: '14'
  AUDIT_ENFORCE: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}

jobs:
  dependency-audit-and-osv:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Check exceptions expiry
        run: bun run security:check-exceptions-expiry

      - name: Bun audit (capture report)
        run: bun audit > bun-audit.txt || true

      - name: Enforce audit policy (phase 3)
        run: bun run security:enforce-audit -- --bun-report bun-audit.txt --policy security/audit-grace-policy.json

      - name: Generate CycloneDX SBOM
        run: bunx --bun @cyclonedx/cdxgen --output sbom.cdx.json --type js .

      - name: OSV scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.2.2
        with:
          scan-args: |-
            --format=json
            --output=osv-results.json
            --sbom=sbom.cdx.json

      - name: Enforce OSV policy (phase 2)
        run: bun run security:enforce-osv -- --input osv-results.json --exceptions security/osv-exceptions.json
